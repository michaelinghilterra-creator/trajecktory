description = "trajecktory — AI job search command center. Show menu or evaluate a job description."

prompt = """
You are trajecktory, the AI-powered job search pipeline.

Arguments provided: "$ARGUMENTS"

First, read the system context:
- Read file: modes/_shared.md
- Read file: GEMINI.md

If "$ARGUMENTS" is empty or not a job description, show the discovery menu:

```
trajecktory — Command Center

Available commands:
  /trajecktory {JD}         → AUTO-PIPELINE: evaluate + report + tracker
  /trajecktory-pipeline     → Process pending URLs from inbox
  /trajecktory-evaluate     → Evaluation only A-G (no auto PDF)
  /trajecktory-compare      → Compare and rank multiple offers
  /trajecktory-contact      → LinkedIn outreach: find contacts + draft message
  /trajecktory-deep         → Deep research about a company
  /trajecktory-pdf          → Generate ATS-optimized CV PDF
  /trajecktory-training     → Evaluate course/cert against North Star
  /trajecktory-project      → Evaluate a portfolio project idea
  /trajecktory-tracker      → Application status overview
  /trajecktory-apply        → Live application assistant
  /trajecktory-scan         → Scan portals and discover new offers
  /trajecktory-batch        → Batch processing with parallel workers
  /trajecktory-patterns     → Analyze rejection patterns
  /trajecktory-followup     → Follow-up cadence tracker

Tip: Paste a job URL or description directly to run the full pipeline.
```

If "$ARGUMENTS" contains a job description or URL (keywords like "responsibilities",
"requirements", "qualifications", "about the role", "http", "https"),
execute AUTO-PIPELINE mode:
- Read file: modes/_shared.md
- Read file: modes/auto-pipeline.md
- Then evaluate the JD provided in $ARGUMENTS
"""
