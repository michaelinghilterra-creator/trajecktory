# trajecktory — Canonical States
# Source of truth for the pipeline writer and dashboard reader.
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.
#
# funnel_order: left-to-right position in the pipeline funnel (omitted for
#   terminal/off-funnel states). group: interview marks the interview-family
#   rungs so consumers can derive the family without hardcoding it.

states:
  - id: evaluated
    label: Evaluated
    aliases: [evaluada]
    description: Offer evaluated with report, pending decision
    dashboard_group: evaluated
    funnel_order: 0

  - id: applied
    label: Applied
    aliases: [aplicado, enviada, aplicada, sent]
    description: Application submitted
    dashboard_group: applied
    funnel_order: 1

  - id: responded
    label: Responded
    aliases: [respondido]
    description: Company has responded (not yet interview)
    dashboard_group: responded
    funnel_order: 2

  - id: phone_screen
    label: Phone Screen
    aliases: [ta screen, ta phone screen, recruiter screen, hr screen, phone_screen, phonescreen]
    description: Recruiter / TA phone screen
    dashboard_group: interview
    group: interview
    funnel_order: 3

  - id: interview_1
    label: 1st Interview
    aliases: [interview, entrevista, first interview, round 1, 1st interview, interview 1]
    description: First interview round (hiring manager or first panel)
    dashboard_group: interview
    group: interview
    funnel_order: 4

  - id: interview_2
    label: 2nd Interview
    aliases: [second interview, round 2, 2nd interview, interview 2]
    description: Second interview round
    dashboard_group: interview
    group: interview
    funnel_order: 5

  - id: interview_3
    label: 3rd Interview
    aliases: [third interview, round 3, 3rd interview, interview 3]
    description: Third interview round
    dashboard_group: interview
    group: interview
    funnel_order: 6

  - id: interview_4
    label: 4th Interview
    aliases: [fourth interview, round 4, 4th interview, interview 4, final round, final loop]
    description: Fourth interview round (final loop)
    dashboard_group: interview
    group: interview
    funnel_order: 7

  - id: offer
    label: Offer
    aliases: [oferta]
    description: Offer received
    dashboard_group: offer
    funnel_order: 8

  - id: rejected
    label: Rejected
    aliases: [rechazado, rechazada]
    description: Rejected by company
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    aliases: [descartado, descartada, cerrada, cancelada]
    description: Discarded by candidate or offer closed
    dashboard_group: discarded

  - id: skip
    label: SKIP
    aliases: [no_aplicar, no aplicar, skip, monitor]
    description: Doesn't fit, don't apply
    dashboard_group: skip

  - id: closed
    label: Closed
    aliases: [no longer available, expired, nla, posting closed, role closed]
    description: Job posting is no longer available or has been closed
    dashboard_group: closed

  - id: not_a_fit
    label: Not a Fit
    aliases: [not a fit, naf, no fit, poor fit]
    description: "Role evaluated and determined to be a poor fit: signal noise, wrong level, wrong domain"
    dashboard_group: not_a_fit

  - id: no_response
    label: No Response
    aliases: [no response, ghosted, no reply, ghost]
    description: Applied but the company never responded (ghosted). Counts as a sent application with no response in analytics.
    dashboard_group: no_response

# ─── Outreach states ─────────────────────────────────────────────────────────
# Recruiter and Target-Talent contacts move along their OWN ladders, separate
# from the application funnel above. They lived only as hardcoded arrays in
# dashboard-web/src/recruiters.jsx and server/lib/recruiters.mjs,
# which is how `Bounced` came to exist in the data and in no ladder at all: it
# fell through a `?.stage || 0` lookup and rendered as "Not Contacted", telling
# the user a hard-bounced address had never been contacted.
#
# contacted: true means a message actually went out. It is deliberately separate
# from `stage`, because Dormant and Bounced are entered AFTER contact yet sit off
# the ladder — so any `stage >= sent` test silently erases them from outreach
# counts, and (since they are denominator-only) inflates the reply rate.

recruiter_states:
  - id: not_contacted
    label: Not Contacted
    stage: 0
    contacted: false
  - id: drafted
    label: Drafted
    stage: 1
    contacted: false
  - id: sent
    label: Sent
    stage: 2
    contacted: true
  - id: replied
    label: Replied
    stage: 3
    contacted: true
    replied: true
  - id: meeting_scheduled
    label: Meeting Scheduled
    stage: 4
    contacted: true
    replied: true
  - id: connected
    label: Connected
    stage: 5
    contacted: true
    replied: true
  - id: dormant
    label: Dormant
    description: Parked after contact (commonly a bounce or a dead thread). Off the ladder, but the outreach happened.
    contacted: true
  - id: bounced
    label: Bounced
    description: Hard bounce. The message was sent; the address is dead.
    contacted: true

# Target-Talent contacts share the recruiter vocabulary plus Archived.
talent_states:
  - id: not_contacted
    label: Not Contacted
    stage: 0
    contacted: false
  - id: sent
    label: Sent
    stage: 2
    contacted: true
  - id: replied
    label: Replied
    stage: 3
    contacted: true
    replied: true
  - id: meeting_scheduled
    label: Meeting Scheduled
    stage: 4
    contacted: true
    replied: true
  - id: connected
    label: Connected
    stage: 5
    contacted: true
    replied: true
  - id: dormant
    label: Dormant
    contacted: true
  - id: archived
    label: Archived
    description: >-
      Set by the Reconcile flow once every related application closes. WARNING:
      this OVERWRITES the prior outreach status in place, so a contact who had
      replied becomes indistinguishable from one never contacted. `lastTouch`
      survives and is the only remaining evidence that a message went out, which
      makes it valid for an outreach DENOMINATOR but never for a reply numerator.
      Any reply rate over archived contacts is a floor, not a measurement.
    contacted: false
