# Portal Scanner Configuration
# Used by /trajecktory scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about
#
# ── WHAT THIS STARTER IS, AND WHAT IT IS NOT ─────────────────────────────────
# This is a DELIBERATELY BROAD starting point, not a curated list for you. It
# exists so a brand-new user's very first scan returns something real, and it is
# meant to be replaced by the Launchpad "Roles" and "Companies" steps, which
# rewrite title_filter, search_queries, and tracked_companies to match you.
#
# It was rebuilt on 2026-07-21 because the previous version was not neutral at
# all: 96 companies weighted to AI labs and dev-tools, an AI-only positive title
# list carrying German keywords, and 12 search queries hardcoded to AI titles.
# A tester whose target roles sat well outside AI ran a full setup against it and
# got ONE reviewable posting.
# The filter, not the company list, did most of that damage — so both are wider
# now, and the negative list has been cut back to only what is near-universally
# unwanted. Exclusions for a specific tech stack are personal preferences and
# belong in YOUR portals.yml, not in everyone's starting point.
#
# Every company below was verified to have live postings on its board when this
# file was generated. Boards do go dead; see the "Legacy-slug tombstones" and
# ATS-migration notes in AGENTS.md before you remove or re-add one.

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
# An EMPTY positive list passes every title through, which is a valid choice if
# you would rather filter by hand at first.

title_filter:
  positive:
    # [CUSTOMIZE] Replace these with keywords matching YOUR target roles.
    # Broad on purpose: better to see too much on a first scan than nothing.
    # -- Analysis & business roles --
    - "Analyst"
    - "Business Analyst"
    - "Systems Analyst"
    - "Data Analyst"
    - "Business Intelligence"
    - "Insights"
    - "Strategy"
    - "Consultant"
    # -- Product, project & delivery --
    - "Product Manager"
    - "Product Owner"
    - "Project Manager"
    - "Program Manager"
    - "Scrum Master"
    - "Agile"
    - "Delivery Manager"
    - "Transformation"
    - "Process Improvement"
    - "Continuous Improvement"
    # -- Operations --
    - "Operations"
    - "Business Operations"
    - "Revenue Operations"
    - "Sales Operations"
    - "Supply Chain"
    - "Procurement"
    - "Logistics"
    - "Quality"
    # -- Technical & engineering --
    - "Engineer"
    - "Developer"
    - "Architect"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Sales Engineer"
    - "Implementation"
    - "Integration"
    - "Platform"
    - "Data Engineer"
    - "Analytics Engineer"
    - "DevOps"
    - "Site Reliability"
    - "Security"
    - "Automation"
    # -- Customer-facing --
    - "Customer Success"
    - "Account Manager"
    - "Partner Manager"
    - "Solutions Consultant"
    # -- Corporate functions --
    - "Finance"
    - "Accounting"
    - "Controller"
    - "Marketing"
    - "People Operations"
    - "Human Resources"
    - "Talent"
    - "Compliance"
    - "Risk"
    - "Legal"
    # -- Design --
    - "Designer"
    - "User Experience"
    - "Product Design"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude.
    # Kept SHORT on purpose. A long default negative list silently deletes good
    # postings: the previous version excluded "SAP ", "Oracle EBS", ".NET",
    # "Java " and "Salesforce Admin", which are exactly the titles an enterprise
    # analyst wants to see. Add your own stack exclusions here; do not assume
    # anyone else's.
    - "Intern"
    - "Internship"
    - "Junior"
    - "Entry Level"
    - "Apprentice"
    - "Co-op"
    - "Volunteer"
    - "Unpaid"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.
#
# [CUSTOMIZE] These are broad starter queries across the three ATS platforms the
# free API scan can read. The Launchpad "Roles" step rewrites them around your
# actual target titles, which is when they get genuinely useful. Until then they
# are wide by design. Add `remote` or a city to any query to narrow it.

search_queries:
  # -- Ashby --
  - name: Ashby — analysis & delivery
    query: 'site:jobs.ashbyhq.com "Business Analyst" OR "Product Manager" OR "Project Manager" OR "Scrum Master"'
    enabled: true

  - name: Ashby — technical & solutions
    query: 'site:jobs.ashbyhq.com "Solutions Architect" OR "Solutions Engineer" OR "Implementation" OR "Data Engineer"'
    enabled: true

  - name: Ashby — operations
    query: 'site:jobs.ashbyhq.com "Business Operations" OR "Revenue Operations" OR "Supply Chain" OR "Program Manager"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — analysis & delivery
    query: 'site:job-boards.greenhouse.io "Business Analyst" OR "Product Manager" OR "Project Manager" OR "Scrum Master"'
    enabled: true

  - name: Greenhouse — technical & solutions
    query: 'site:job-boards.greenhouse.io "Solutions Architect" OR "Solutions Engineer" OR "Implementation" OR "Data Engineer"'
    enabled: true

  - name: Greenhouse — operations
    query: 'site:job-boards.greenhouse.io "Business Operations" OR "Revenue Operations" OR "Supply Chain" OR "Program Manager"'
    enabled: true

  - name: Greenhouse — corporate functions
    query: 'site:job-boards.greenhouse.io "Finance Manager" OR "Controller" OR "People Operations" OR "Compliance"'
    enabled: true

  # -- Lever --
  - name: Lever — analysis & delivery
    query: 'site:jobs.lever.co "Business Analyst" OR "Product Manager" OR "Project Manager" OR "Scrum Master"'
    enabled: true

  - name: Lever — technical & solutions
    query: 'site:jobs.lever.co "Solutions Architect" OR "Solutions Engineer" OR "Implementation" OR "Data Engineer"'
    enabled: true

  # -- Cross-board senior roles --
  - name: All boards — senior & director
    query: '"Director" OR "Head of" OR "Senior Manager" site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

