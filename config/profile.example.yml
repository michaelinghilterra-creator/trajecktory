# trajecktory Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"
  # (Optional) Canva resume design ID for visual CV generation via /trajecktory pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  # Illustrative only. Replace both with your own numbers in config/profile.yml,
  # which is gitignored — never put real compensation in this tracked example.
  target_range: "$95K-135K"      # Your target total comp
  currency: "USD"
  minimum: "$88K"                # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

credentials:
  # Certifications and completed coursework. The Launchpad detects these from
  # cv.md (you confirm them). Each entry: name + issuer. Used for JD requirement
  # matching and resume tailoring.
  certifications: []
  #  - name: "Power BI Data Analyst Associate (PL-300)"
  #    issuer: "Microsoft"

outputs:
  # Where generated artifacts are written. Project-relative by default; set an
  # absolute path (e.g. a folder under Documents) to keep outputs out of the
  # install directory. Read by modes/docx*.md and modes/interview-prep.md.
  # NOTE: company reports are NOT configurable — they always stay in reports/
  # so the dashboard can read them and the tracker links resolve.
  resume_dir: "output"
  interview_prep_dir: "interview-prep"

scoring:
  # The evaluation headline (0-5) is DERIVED by code, never written by the model.
  # The model rates each dimension below 0-5 with its evidence; lib/score.mjs
  # computes the headline as the weighted average of these dimensions, minus a
  # red-flag penalty. Retune the weights to match your priorities. They are
  # renormalized over whichever dimensions an evaluation includes, so they do not
  # have to sum to exactly 1.
  weights:
    fit: 0.35         # skills, experience, and proof-point alignment with the JD
    northStar: 0.25   # fit with your target archetypes (the work you actually want)
    level: 0.15       # seniority match: title vs real scope
    # comp is deliberately 0: an aspiration informs, a floor gates. compensation.
    # target_range is what you are aiming for, and you can miss it and still want
    # the job, so it must not lower a score that decides whether you apply at all.
    # compensation.minimum is the hard floor, which is binary, so it sets a
    # scoreCeiling instead (a weighted average can be outvoted by a strong fit;
    # a ceiling cannot). The dimension is still rated and shown, just not scored.
    # Raise it if you want pay to move the headline, but expect well-paid roles
    # that are a poor fit to rise with it.
    comp: 0
    location: 0.10    # location, remote policy, and logistics fit
  # With comp at 0 the four remaining weights renormalize to fit 0.41,
  # northStar 0.29, level 0.18, location 0.12.
  # Most points subtracted when red flags are severe. The model rates red-flag
  # cleanliness 0-5 (5 = clean); a 0 subtracts this whole amount from the average.
  redFlagPenalty: 1.5
