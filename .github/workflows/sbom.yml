name: SBOM Generation
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # anchore/sbom-action already attaches the generated SBOM to the release
      # that triggered this run (upload-release-assets defaults to true, set
      # explicitly here as the source of truth). A separate `gh release upload`
      # step therefore uploaded a SECOND copy of the same asset and failed with
      # "asset under the same name already exists" on every release from v1.12.0
      # onward — the SBOM was on the release the whole time, the redundant upload
      # just turned the run red. Let the action own the upload.
      - name: Generate SBOM (SPDX) and attach to release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: trajecktory-sbom.spdx.json
          format: spdx-json
          output-file: trajecktory-sbom.spdx.json
          upload-release-assets: true
