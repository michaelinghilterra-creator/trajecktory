name: Release health

# Guards the two steps that are done BY HAND after a release PR merges, and that
# nothing else can catch:
#   1. the newest tag is signed by a key in trusted-signers
#   2. the newest release carries notes written for a reader
#
# Both fail the same way: silently, with a green release run, which is why they
# need a guard rather than a line in a checklist. Signing was already missed on
# two releases; the notes were missed on the two releases immediately after the
# app started rendering them.
#
# Why this exists, and why it is not part of release.yml:
#
# update-system.mjs offers an update only for the highest version tag greater
# than the local one WHOSE SIGNATURE VERIFIES (findSignedUpdate). An unsigned
# newest tag therefore does not break an install, it silently freezes it: the
# updater reports nothing newer and says nothing else. There is no error to
# notice, which is exactly how v1.11.0 and then v1.16.0 both shipped unsigned
# while the release workflow reported success.
#
# release.yml only emits a ::warning when TAG_SIGNING_SSH_KEY is unset, because
# the signing key is deliberately kept OFF CI (see the comment there): the key is
# the root of trust for self-update, and a compromised action holding it could
# sign a malicious tag, which is the precise attack signing exists to prevent.
#
# So the tag is signed by hand after the release PR merges, and the gap this
# guards appears AFTER a merge, not inside a PR. That rules out both test.yml
# (runs pre-merge, when the tag does not exist yet) and release.yml (would go red
# on every single release by design, and a check that always fails is a check
# nobody reads).
#
# A daily schedule leaves a window to sign by hand and turns forgetting into a
# red build instead of a silent freeze. Run it manually straight after signing to
# confirm rather than waiting.

on:
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  newest-tag-is-signed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify the newest release tag carries a trusted signature
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          # Highest version tag, matching what findSignedUpdate walks. sort -V
          # orders v1.10.0 above v1.9.0; a lexical sort does not.
          TAG="$(git tag -l 'v*' | sort -V | tail -1)"
          if [ -z "${TAG}" ]; then
            echo "No version tags yet — nothing to verify."
            exit 0
          fi
          echo "Newest release tag: ${TAG}"

          # A lightweight tag is a plain commit ref. It cannot carry a signature
          # at all, so it fails differently from a bad signature and is worth
          # naming separately: Release Please creates exactly this, and it is
          # what shipped unsigned twice.
          TYPE="$(git cat-file -t "${TAG}")"
          if [ "${TYPE}" != "tag" ]; then
            echo "::error title=Newest release tag is unsigned::${TAG} is a lightweight tag (${TYPE}), so it cannot carry a signature. Every anchored install is frozen below it: update-system.mjs only offers a tag whose signature verifies, and reports nothing newer otherwise. Fix: git fetch --tags --force && git tag -s -f ${TAG} \"${TAG}^{commit}\" -m \"trajecktory ${TAG}\" && git push origin ${TAG} --force"
            exit 1
          fi

          if ! git -c gpg.ssh.allowedSignersFile=trusted-signers verify-tag "${TAG}"; then
            echo "::error title=Newest release tag signature does not verify::${TAG} is annotated but its signature is missing, malformed, or made by a key that is not pinned in trusted-signers. Anchored installs will refuse it. Re-sign with the pinned key per docs/RELEASING.md."
            exit 1
          fi

          echo "OK — ${TAG} is signed by a key pinned in trusted-signers."
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      # Release Please writes the release body from commit SUBJECTS. Since the
      # dashboard began rendering that body (Change Log tab + the update banner),
      # leaving it raw ships Conventional Commit scopes and internal script names
      # into the product, to a reader deciding whether to take an update. It is
      # not a silent freeze like an unsigned tag, but it fails the same way: the
      # release run goes green and nothing anywhere says the notes were never
      # rewritten. It was missed on the two releases straight after that feature
      # landed, including the release that shipped the feature itself.
      - name: Verify the newest release has notes written for a reader
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" --json body > /tmp/rel.json 2>/dev/null; then
            echo "::warning title=No GitHub release for ${TAG}::The tag exists but has no release. Release Please normally creates one; if this persists, the release step did not complete."
            exit 0
          fi
          BODY="$(jq -r '.body // ""' /tmp/rel.json)"

          if [ -z "${BODY//[$'\t\r\n ']/}" ]; then
            echo "::error title=Release ${TAG} has an empty body::Write the notes per the checklist in docs/RELEASING.md. The dashboard renders this text in Setup → Change Log and in the update banner, so an empty body leaves users with nothing."
            exit 1
          fi

          # A body Release Please generated opens with its compare link heading.
          # A body written for a reader opens with prose.
          if printf '%s\n' "${BODY}" | head -1 | grep -qE '^##[[:space:]]+\[[0-9]+\.[0-9]+\.[0-9]+\]\(.*/compare/'; then
            echo "::error title=Release ${TAG} still has auto-generated notes::The body is the raw Release Please changelog, so the Change Log tab and the update banner will show commit subjects (internal script names, Conventional Commit scopes) instead of notes written for a reader. Fix: rewrite the body per docs/RELEASING.md, then re-run this workflow."
            exit 1
          fi

          echo "OK — ${TAG} has a written release body."
