name: Release health

# Guards the three steps that are done BY HAND after a release PR merges, and
# that nothing else can catch:
#   1. the newest tag is signed by a key in trusted-signers
#   2. the newest release carries notes written for a reader
#   3. a release that changes the BUNDLE ships an installer carrying the change
#
# All three fail the same way: silently, with a green release run, which is why
# they need a guard rather than a line in a checklist. Signing was already missed
# on two releases; the notes were missed on the two releases immediately after
# the app started rendering them; the installer was missed on v1.17.7, which
# shipped a security fix that reached nobody.
#
# Why this exists, and why it is not part of release.yml:
#
# update-system.mjs offers an update only for the highest version tag greater
# than the local one WHOSE SIGNATURE VERIFIES (findSignedUpdate). An unsigned
# newest tag therefore does not break an install, it silently freezes it: the
# updater reports nothing newer and says nothing else. There is no error to
# notice, which is exactly how v1.11.0 and then v1.16.0 both shipped unsigned
# while the release workflow reported success.
#
# release.yml only emits a ::warning when TAG_SIGNING_SSH_KEY is unset, because
# the signing key is deliberately kept OFF CI (see the comment there): the key is
# the root of trust for self-update, and a compromised action holding it could
# sign a malicious tag, which is the precise attack signing exists to prevent.
#
# So the tag is signed by hand after the release PR merges, and the gap this
# guards appears AFTER a merge, not inside a PR. That rules out both test.yml
# (runs pre-merge, when the tag does not exist yet) and release.yml (would go red
# on every single release by design, and a check that always fails is a check
# nobody reads).
#
# A daily schedule leaves a window to sign by hand and turns forgetting into a
# red build instead of a silent freeze. Run it manually straight after signing to
# confirm rather than waiting.

on:
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:
  # Fire as soon as a release is published or its body is edited, so a malformed
  # release is caught in a minute rather than sitting live until the next daily
  # run. The cron stays: it is what catches a tag that was never signed, which is
  # a state no event announces.
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  newest-tag-is-signed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify the newest release tag carries a trusted signature
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          # Highest version tag, matching what findSignedUpdate walks. sort -V
          # orders v1.10.0 above v1.9.0; a lexical sort does not.
          TAG="$(git tag -l 'v*' | sort -V | tail -1)"
          if [ -z "${TAG}" ]; then
            echo "No version tags yet — nothing to verify."
            exit 0
          fi
          echo "Newest release tag: ${TAG}"

          # A lightweight tag is a plain commit ref. It cannot carry a signature
          # at all, so it fails differently from a bad signature and is worth
          # naming separately: Release Please creates exactly this, and it is
          # what shipped unsigned twice.
          TYPE="$(git cat-file -t "${TAG}")"
          if [ "${TYPE}" != "tag" ]; then
            echo "::error title=Newest release tag is unsigned::${TAG} is a lightweight tag (${TYPE}), so it cannot carry a signature. Every anchored install is frozen below it: update-system.mjs only offers a tag whose signature verifies, and reports nothing newer otherwise. Fix: git fetch --tags --force && git tag -s -f ${TAG} \"${TAG}^{commit}\" -m \"trajecktory ${TAG}\" && git push origin ${TAG} --force"
            exit 1
          fi

          if ! git -c gpg.ssh.allowedSignersFile=trusted-signers verify-tag "${TAG}"; then
            echo "::error title=Newest release tag signature does not verify::${TAG} is annotated but its signature is missing, malformed, or made by a key that is not pinned in trusted-signers. Anchored installs will refuse it. Re-sign with the pinned key per docs/RELEASING.md."
            exit 1
          fi

          echo "OK — ${TAG} is signed by a key pinned in trusted-signers."
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      # Release Please writes the release body from commit SUBJECTS. Since the
      # dashboard began rendering that body (Change Log tab + the update banner),
      # leaving it raw ships Conventional Commit scopes and internal script names
      # into the product, to a reader deciding whether to take an update. It is
      # not a silent freeze like an unsigned tag, but it fails the same way: the
      # release run goes green and nothing anywhere says the notes were never
      # rewritten. It was missed on the two releases straight after that feature
      # landed, including the release that shipped the feature itself.
      - name: Verify the newest release has notes written for a reader
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" --json body > /tmp/rel.json 2>/dev/null; then
            echo "::warning title=No GitHub release for ${TAG}::The tag exists but has no release. Release Please normally creates one; if this persists, the release step did not complete."
            exit 0
          fi
          BODY="$(jq -r '.body // ""' /tmp/rel.json)"

          if [ -z "${BODY//[$'\t\r\n ']/}" ]; then
            echo "::error title=Release ${TAG} has an empty body::Write the notes per the checklist in docs/RELEASING.md. The dashboard renders this text in Setup → Change Log and in the update banner, so an empty body leaves users with nothing."
            exit 1
          fi

          # A body Release Please generated opens with its compare link heading.
          # A body written for a reader opens with prose.
          if printf '%s\n' "${BODY}" | head -1 | grep -qE '^##[[:space:]]+\[[0-9]+\.[0-9]+\.[0-9]+\]\(.*/compare/'; then
            echo "::error title=Release ${TAG} still has auto-generated notes::The body is the raw Release Please changelog, so the Change Log tab and the update banner will show commit subjects (internal script names, Conventional Commit scopes) instead of notes written for a reader. Fix: rewrite the body per docs/RELEASING.md, then re-run this workflow."
            exit 1
          fi

          echo "OK — ${TAG} has a written release body."

      # The two checks above catch the ways notes fail LOUDLY: an empty body, and
      # a body still holding the raw changelog. They do not catch the way they
      # fail quietly, which is a body that was genuinely written and then drifted
      # from the format — most often into terse bullets, which RELEASING.md names
      # as "the recurring regression here, and the one thing to check before
      # publishing". Something a human is asked to check before publishing every
      # time is exactly what a guard is for.
      #
      # NOTE the one rule this cannot enforce here. The check against naming a
      # real employer or job title from the maintainer's own job search needs
      # data/applications.md, which is gitignored and never reaches a runner. The
      # script skips it and says so rather than passing vacuously, because a
      # check that cannot fail reads as coverage it does not have. Run
      # `node verify-release-notes.mjs --file <draft>` locally before publishing.
      - name: Verify the release notes follow the house format
        env:
          GH_TOKEN: ${{ github.token }}
          # On a release event, check the release that fired it. Editing an older
          # release would otherwise re-check the newest one and report green on a
          # body nobody just touched. Passed through env rather than interpolated
          # into the shell.
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TARGET="${EVENT_TAG:-${TAG}}"
          echo "Checking release notes for ${TARGET}"
          node verify-release-notes.mjs --tag "${TARGET}"

      # Step 5 of the release checklist: rebuild and upload the installer. It is
      # MANDATORY when the release changes what the bundle contains, optional
      # otherwise, and until now nothing checked which case a release was in.
      #
      # update-system.mjs applies SYSTEM_PATHS with `git checkout <ref> -- <path>`
      # and then runs npm install, so modes, scripts and npm dependencies reach
      # every existing install. SYSTEM_PATHS contains no runtime paths at all, so
      # the vendored Node, the Git for Windows installer, the Playwright browsers
      # and trusted-signers reach NOBODY until a new .exe is built. A release
      # carrying only those changes delivers nothing while reading as complete.
      #
      # v1.17.7 is why this exists. It was published, signed, its notes rewritten
      # and THIS WORKFLOW GREEN, with a Node upgrade off an end-of-life line as
      # its headline entry and no installer attached. Every install stayed on the
      # dead runtime, and new installs could only download a bundle predating the
      # fix, until one was built and uploaded by hand afterwards. Four signals
      # said done and the one that mattered was not checked.
      #
      # installer/trajecktory.iss is deliberately NOT a trigger. Release Please
      # rewrites its `#define AppVersion` on every single release, so watching it
      # would fire this check every time — and a check that always fails is a
      # check nobody reads, which this file argues elsewhere about release.yml.
      # .bundle-version needs no entry either: it is written BY build-bundle.ps1
      # into the payload, so a generation bump is already a change to that script.
      - name: Verify a bundle-only release ships an installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Second-newest version tag. sort -V for the same reason as above.
          PREV="$(git tag -l 'v*' | sort -V | tail -2 | head -1)"
          if [ -z "${PREV}" ] || [ "${PREV}" = "${TAG}" ]; then
            echo "No previous version tag to diff against — skipping."
            exit 0
          fi

          CHANGED="$(git diff --name-only "${PREV}..${TAG}" -- installer/build-bundle.ps1 trusted-signers)"
          if [ -z "${CHANGED}" ]; then
            echo "OK — ${TAG} changes nothing the bundle carries, so an installer is optional."
            exit 0
          fi

          echo "${TAG} changes what the bundle contains:"
          printf '  %s\n' ${CHANGED}

          if ! gh release view "${TAG}" --json assets > /tmp/assets.json 2>/dev/null; then
            echo "::warning title=No GitHub release for ${TAG}::Cannot check for an installer asset."
            exit 0
          fi

          # startswith/endswith rather than a regex: the pattern would have to
          # survive YAML block scalar, shell quoting and jq string escaping, and
          # a mis-escaped `\.` silently matches nothing, which turns this guard
          # into one that always passes. That is the failure mode worth designing
          # out, not the one worth testing for.
          if jq -e '[.assets[].name] | any(startswith("trajecktory-setup-") and endswith(".exe"))' /tmp/assets.json > /dev/null; then
            echo "OK — ${TAG} ships an installer carrying those changes."
            exit 0
          fi

          CHANGED_ONE_LINE="$(printf '%s' "${CHANGED}" | tr '\n' ' ')"
          echo "::error title=Release ${TAG} changes the bundle but ships no installer::${CHANGED_ONE_LINE}changed since ${PREV}, and changes there reach users ONLY through a newly built .exe — self-update carries code, never the vendored runtimes or trusted-signers. Every install stays on the previous bundle while the release notes claim otherwise. Fix: build and upload per step 5 in docs/RELEASING.md, then re-run this workflow."
          exit 1
