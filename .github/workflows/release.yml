name: Release Please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          # Prefer a PAT / GitHub App token so the release PR triggers required
          # status checks (the default GITHUB_TOKEN does not trigger downstream
          # workflows, so branch-protection checks would never run on it). Falls
          # back to GITHUB_TOKEN until the RELEASE_PLEASE_TOKEN secret is added.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
