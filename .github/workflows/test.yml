name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: npm ci
      # Fail the build on a known high-severity advisory in a dependency.
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: node test-all.mjs --quick
      # Build the dashboard-web app so a broken React/esbuild change fails CI.
      - run: npm ci
        working-directory: dashboard-web
      - run: npm audit --audit-level=high
        working-directory: dashboard-web
      - run: npm run build
        working-directory: dashboard-web
