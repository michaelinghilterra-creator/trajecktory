name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
      - run: npm ci
      # Fail the build on a known high-severity advisory in a dependency.
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: node test-all.mjs --quick
      # Build the dashboard-web app so a broken React/esbuild change fails CI.
      - run: npm ci
        working-directory: dashboard-web
      - run: npm audit --audit-level=high
        working-directory: dashboard-web
      - run: npm run build
        working-directory: dashboard-web
