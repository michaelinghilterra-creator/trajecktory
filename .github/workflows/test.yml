name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: npm ci
      # Fail the build on a known high-severity advisory in a dependency.
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: node test-all.mjs
      # Build the dashboard-web app so a broken React/esbuild change fails CI.
      # This is the "dashboard build" the old test-all.mjs --quick flag claimed
      # to skip; it has always been a separate step, and the flag was inert.
      - run: npm ci
        working-directory: dashboard-web
      - run: npm audit --audit-level=high
        working-directory: dashboard-web
      - run: npm run build
        working-directory: dashboard-web
